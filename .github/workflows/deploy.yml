name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  deploy-staging:
    name: 🚀 Staging
    if: github.ref_type == 'branch'
    # Scope this job to the 'staging' environment
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        run: echo "✅ Deploying to ${{ vars.APP_URL }}"

  approve-production:
    name: 🔐 Await Approval
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    # This environment should have 'Required Reviewers' enabled in GitHub Settings
    environment: production
    steps:
      - run: echo "Approval granted for version ${{ github.ref_name }}"

  deploy-production:
    name: 🎉 Production
    if: github.ref_type == 'tag'
    needs: approve-production
    runs-on: ubuntu-latest
    # CRITICAL: You must declare the environment here too to access its variables
    environment: production
    steps:
      - name: Deploy to Production
        run: |
          echo "✅ This is PRODUCTION — version ${{ github.ref_name }}"
          echo "Targeting API: ${{ vars.PRODUCTION_API_ENDPOINT }}"
        env:
          # Example of mapping a scoped var to a shell env var
          API_URL: ${{ vars.PRODUCTION_API_ENDPOINT }}
