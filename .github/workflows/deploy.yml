name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  deploy-staging:
    name: 🚀 Staging
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ This is STAGING"

  approve-production:
    name: 🔐 Await Approval
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Approval granted"

  deploy-production:
    name: 🎉 Production
    if: github.ref_type == 'tag'
    needs: approve-production
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ This is PRODUCTION — version ${{ github.ref_name }}"
