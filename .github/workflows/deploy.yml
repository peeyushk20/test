name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: 🚀 Staging
    if: github.ref_type == 'branch'
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Simple Echo (Matches your working example)
      - name: 1. Echo Variable
        run: echo "✅ The Staging URL is set to ${{ vars.APP_URL }}"

      # 2. Direct Curl
      # Note: We use quotes around the variable to prevent shell errors
      - name: 2. Direct Curl
        run: |
          echo "Attempting Direct Curl..."
          curl -fL "${{ vars.APP_URL }}"

      # 3. Mapped Env Curl (The cleanest/most robust way)
      - name: 3. Mapped Env Curl
        env:
          TARGET_URL: ${{ vars.APP_URL }}
        run: |
          echo "Attempting Mapped Curl to $TARGET_URL"
          curl -fL "$TARGET_URL"

  approve-production:
    name: 🔐 Await Approval
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Approval granted for version ${{ github.ref_name }}"

  deploy-production:
    name: 🎉 Production
    if: github.ref_type == 'tag'
    needs: approve-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Production
        run: |
          echo "✅ Production version ${{ github.ref_name }}"
          curl -fL "${{ vars.PRODUCTION_API_ENDPOINT }}"
